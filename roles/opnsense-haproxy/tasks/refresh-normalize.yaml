---
# roles/opnsense-haproxy/tasks/refresh-normalize.yaml
#
# Fetches the current HAProxy settings/get response and normalizes all five
# collection sub-keys into clean facts safe to use with dict2items.
#
# The OPNsense HAProxy API returns collection sub-keys as:
#   []  — JSON array  when the collection is empty
#   {}  — JSON object when items exist (keyed by UUID)
#
# The `is mapping` test distinguishes the two cases, returning {} for the
# empty-list case so that dict2items never receives a list.
#
# Facts set:
#   _hp_cfg       — raw API response
#   _hp_servers   — haproxy.servers.server   normalized to dict
#   _hp_backends  — haproxy.backends.backend normalized to dict
#   _hp_acls      — haproxy.acls.acl         normalized to dict
#   _hp_actions   — haproxy.actions.action   normalized to dict
#   _hp_frontends — haproxy.frontends.frontend normalized to dict

- name: Fetch HAProxy config (settings/get)
  ansible.builtin.uri:
    url: "{{ opnsense_api_base }}/api/haproxy/settings/get"
    method: GET
    url_username: "{{ opnsense_api_key }}"
    url_password: "{{ opnsense_api_secret }}"
    force_basic_auth: true
    validate_certs: false
    return_content: true
  register: _hp_cfg
  delegate_to: localhost

- name: Normalize HAProxy collections (list-or-dict -> dict)
  ansible.builtin.set_fact:
    _hp_servers: >-
      {{ (_hp_cfg.json.haproxy.servers.server       if _hp_cfg.json.haproxy.servers.server       is mapping else {}) }}
    _hp_backends: >-
      {{ (_hp_cfg.json.haproxy.backends.backend     if _hp_cfg.json.haproxy.backends.backend     is mapping else {}) }}
    _hp_acls: >-
      {{ (_hp_cfg.json.haproxy.acls.acl             if _hp_cfg.json.haproxy.acls.acl             is mapping else {}) }}
    _hp_actions: >-
      {{ (_hp_cfg.json.haproxy.actions.action       if _hp_cfg.json.haproxy.actions.action       is mapping else {}) }}
    _hp_frontends: >-
      {{ (_hp_cfg.json.haproxy.frontends.frontend   if _hp_cfg.json.haproxy.frontends.frontend   is mapping else {}) }}
