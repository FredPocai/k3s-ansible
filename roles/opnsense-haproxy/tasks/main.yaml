---
# roles/opnsense-haproxy/tasks/main.yaml
#
# Configures HAProxy on OPNsense via the os-haproxy plugin API.
#
# Architecture:
#   :443  TCP frontend  — SNI inspection -> k3s passthrough + fw loopback
#   :8444 HTTPS frontend — TLS termination for fw.{{ base_domain }}
#   :80   HTTP frontend  — redirect to HTTPS
#
# Tags: opnsense, opnsense-haproxy
#
# API field-name notes (confirmed from settings/get response):
#   - Backend server membership : linkedServers  (NOT "servers")
#   - Action type selection     : type           (NOT "operator")
#   - Action backend target     : use_backend    (NOT "backend")
#   - Action ACL linkage        : linkedAcls     (NOT "acl")
#   - All endpoints             : snake_case     (add_server, add_backend, etc.)

- name: Wait for HAProxy API to become available
  ansible.builtin.uri:
    url: "{{ opnsense_api_base }}/api/haproxy/settings/get"
    method: GET
    url_username: "{{ opnsense_api_key }}"
    url_password: "{{ opnsense_api_secret }}"
    force_basic_auth: true
    validate_certs: false
    status_code: [200]
  register: _hp_api_check
  until: _hp_api_check.status == 200
  retries: 12
  delay: 15
  delegate_to: localhost
  tags: [opnsense, opnsense-haproxy]

- name: Initial fetch and normalize
  ansible.builtin.include_tasks: refresh-normalize.yaml
  tags: [opnsense, opnsense-haproxy]

# =================================================================
# SERVERS
# =================================================================

- name: Create HAProxy server entries for k3s nodes
  ansible.builtin.uri:
    url: "{{ opnsense_api_base }}/api/haproxy/settings/add_server"
    method: POST
    url_username: "{{ opnsense_api_key }}"
    url_password: "{{ opnsense_api_secret }}"
    force_basic_auth: true
    validate_certs: false
    body_format: json
    body:
      server:
        enabled: "1"
        name: "{{ item.name }}"
        address: "{{ item.ip }}"
        port: "443"
        checkport: "443"
        mode: "active"
        ssl: "1"
        sslVerify: "0"
        description: "k3s ingress node — managed by Ansible"
    status_code: [200]
  delegate_to: localhost
  loop: "{{ k3s_nodes }}"
  when: item.name not in (_hp_servers | dict2items | map(attribute='value.name') | list)
  tags: [opnsense, opnsense-haproxy]

- name: Create HAProxy server entry for OPNsense GUI (:8080 HTTP)
  ansible.builtin.uri:
    url: "{{ opnsense_api_base }}/api/haproxy/settings/add_server"
    method: POST
    url_username: "{{ opnsense_api_key }}"
    url_password: "{{ opnsense_api_secret }}"
    force_basic_auth: true
    validate_certs: false
    body_format: json
    body:
      server:
        enabled: "1"
        name: "opnsense-gui"
        address: "127.0.0.1"
        port: "8080"
        checkport: "8080"
        mode: "active"
        ssl: "0"
        description: "OPNsense GUI HTTP — managed by Ansible"
    status_code: [200]
  delegate_to: localhost
  when: "'opnsense-gui' not in (_hp_servers | dict2items | map(attribute='value.name') | list)"
  tags: [opnsense, opnsense-haproxy]

- name: Create HAProxy server entry for fw SSL-loopback (:8444)
  ansible.builtin.uri:
    url: "{{ opnsense_api_base }}/api/haproxy/settings/add_server"
    method: POST
    url_username: "{{ opnsense_api_key }}"
    url_password: "{{ opnsense_api_secret }}"
    force_basic_auth: true
    validate_certs: false
    body_format: json
    body:
      server:
        enabled: "1"
        name: "fw-ssl-loopback"
        address: "127.0.0.1"
        port: "8444"
        checkport: "8444"
        mode: "active"
        ssl: "0"
        description: "Loopback to fw HTTPS frontend — managed by Ansible"
    status_code: [200]
  delegate_to: localhost
  when: "'fw-ssl-loopback' not in (_hp_servers | dict2items | map(attribute='value.name') | list)"
  tags: [opnsense, opnsense-haproxy]

- name: Refresh after server creation
  ansible.builtin.include_tasks: refresh-normalize.yaml
  tags: [opnsense, opnsense-haproxy]

- name: Set server UUID facts
  ansible.builtin.set_fact:
    _k3s_server_uuids: >-
      {{
        _hp_servers | dict2items
        | selectattr('value.name', 'in', k3s_nodes | map(attribute='name') | list)
        | map(attribute='key') | list | join(',')
      }}
    _opnsense_server_uuid: >-
      {{
        _hp_servers | dict2items
        | selectattr('value.name', 'equalto', 'opnsense-gui')
        | map(attribute='key') | first
      }}
    _fw_loopback_server_uuid: >-
      {{
        _hp_servers | dict2items
        | selectattr('value.name', 'equalto', 'fw-ssl-loopback')
        | map(attribute='key') | first
      }}
  tags: [opnsense, opnsense-haproxy]

# =================================================================
# BACKENDS
# NOTE: the field that links servers into a backend pool is
#       "linkedServers" (confirmed from settings/get), NOT "servers".
# =================================================================

- name: Create k3s-ingress backend (TCP, round-robin)
  ansible.builtin.uri:
    url: "{{ opnsense_api_base }}/api/haproxy/settings/add_backend"
    method: POST
    url_username: "{{ opnsense_api_key }}"
    url_password: "{{ opnsense_api_secret }}"
    force_basic_auth: true
    validate_certs: false
    body_format: json
    body:
      backend:
        enabled: "1"
        name: "k3s-ingress"
        mode: "tcp"
        algorithm: "roundrobin"
        linkedServers: "{{ _k3s_server_uuids }}"
        description: "k3s ingress-nginx nodes — managed by Ansible"
    status_code: [200]
  delegate_to: localhost
  when: "'k3s-ingress' not in (_hp_backends | dict2items | map(attribute='value.name') | list)"
  tags: [opnsense, opnsense-haproxy]

- name: Create opnsense-gui backend (HTTP)
  ansible.builtin.uri:
    url: "{{ opnsense_api_base }}/api/haproxy/settings/add_backend"
    method: POST
    url_username: "{{ opnsense_api_key }}"
    url_password: "{{ opnsense_api_secret }}"
    force_basic_auth: true
    validate_certs: false
    body_format: json
    body:
      backend:
        enabled: "1"
        name: "opnsense-gui"
        mode: "http"
        algorithm: "roundrobin"
        linkedServers: "{{ _opnsense_server_uuid }}"
        description: "OPNsense GUI :8080 — managed by Ansible"
    status_code: [200]
  delegate_to: localhost
  when: "'opnsense-gui' not in (_hp_backends | dict2items | map(attribute='value.name') | list)"
  tags: [opnsense, opnsense-haproxy]

- name: Create fw-ssl-loopback backend (TCP)
  ansible.builtin.uri:
    url: "{{ opnsense_api_base }}/api/haproxy/settings/add_backend"
    method: POST
    url_username: "{{ opnsense_api_key }}"
    url_password: "{{ opnsense_api_secret }}"
    force_basic_auth: true
    validate_certs: false
    body_format: json
    body:
      backend:
        enabled: "1"
        name: "fw-ssl-loopback"
        mode: "tcp"
        algorithm: "roundrobin"
        linkedServers: "{{ _fw_loopback_server_uuid }}"
        description: "Loopback to fw HTTPS frontend :8444 — managed by Ansible"
    status_code: [200]
  delegate_to: localhost
  when: "'fw-ssl-loopback' not in (_hp_backends | dict2items | map(attribute='value.name') | list)"
  tags: [opnsense, opnsense-haproxy]

- name: Refresh after backend creation
  ansible.builtin.include_tasks: refresh-normalize.yaml
  tags: [opnsense, opnsense-haproxy]

- name: Set backend UUID facts
  ansible.builtin.set_fact:
    _k3s_backend_uuid: >-
      {{
        _hp_backends | dict2items
        | selectattr('value.name', 'equalto', 'k3s-ingress')
        | map(attribute='key') | first
      }}
    _opnsense_backend_uuid: >-
      {{
        _hp_backends | dict2items
        | selectattr('value.name', 'equalto', 'opnsense-gui')
        | map(attribute='key') | first
      }}
    _fw_loopback_backend_uuid: >-
      {{
        _hp_backends | dict2items
        | selectattr('value.name', 'equalto', 'fw-ssl-loopback')
        | map(attribute='key') | first
      }}
  tags: [opnsense, opnsense-haproxy]

# =================================================================
# REPAIR: patch existing backends that were created with wrong field
#         name ("servers" instead of "linkedServers") and therefore
#         have empty server pools.  Idempotent: only fires when the
#         backend exists but has no selected servers.
# =================================================================

- name: Repair k3s-ingress backend linkedServers (if empty)
  ansible.builtin.uri:
    url: "{{ opnsense_api_base }}/api/haproxy/settings/set_backend/{{ _k3s_backend_uuid }}"
    method: POST
    url_username: "{{ opnsense_api_key }}"
    url_password: "{{ opnsense_api_secret }}"
    force_basic_auth: true
    validate_certs: false
    body_format: json
    body:
      backend:
        linkedServers: "{{ _k3s_server_uuids }}"
    status_code: [200]
  delegate_to: localhost
  when: >-
    (_hp_backends | dict2items
     | selectattr('value.name', 'equalto', 'k3s-ingress') | first).value.linkedServers
     | dict2items | selectattr('value.selected', 'equalto', 1) | list | length == 0
  tags: [opnsense, opnsense-haproxy]

- name: Repair opnsense-gui backend linkedServers (if empty)
  ansible.builtin.uri:
    url: "{{ opnsense_api_base }}/api/haproxy/settings/set_backend/{{ _opnsense_backend_uuid }}"
    method: POST
    url_username: "{{ opnsense_api_key }}"
    url_password: "{{ opnsense_api_secret }}"
    force_basic_auth: true
    validate_certs: false
    body_format: json
    body:
      backend:
        linkedServers: "{{ _opnsense_server_uuid }}"
    status_code: [200]
  delegate_to: localhost
  when: >-
    (_hp_backends | dict2items
     | selectattr('value.name', 'equalto', 'opnsense-gui') | first).value.linkedServers
     | dict2items | selectattr('value.selected', 'equalto', 1) | list | length == 0
  tags: [opnsense, opnsense-haproxy]

- name: Repair fw-ssl-loopback backend linkedServers (if empty)
  ansible.builtin.uri:
    url: "{{ opnsense_api_base }}/api/haproxy/settings/set_backend/{{ _fw_loopback_backend_uuid }}"
    method: POST
    url_username: "{{ opnsense_api_key }}"
    url_password: "{{ opnsense_api_secret }}"
    force_basic_auth: true
    validate_certs: false
    body_format: json
    body:
      backend:
        linkedServers: "{{ _fw_loopback_server_uuid }}"
    status_code: [200]
  delegate_to: localhost
  when: >-
    (_hp_backends | dict2items
     | selectattr('value.name', 'equalto', 'fw-ssl-loopback') | first).value.linkedServers
     | dict2items | selectattr('value.selected', 'equalto', 1) | list | length == 0
  tags: [opnsense, opnsense-haproxy]

# =================================================================
# ACLs
# NOTE: The OPNsense HAProxy config generator uses the expression-
#       specific field, NOT the generic "value" field.
#       For ssl_sni ACLs the correct POST field is "ssl_sni: <host>".
#       Using "value: <host>" leaves the ssl_sni field empty, which
#       generates "CONDITION INVALID / ERROR: missing parameters" in
#       haproxy.conf and prevents the service from starting.
# =================================================================

- name: Create SNI ACL for each k3s service
  ansible.builtin.uri:
    url: "{{ opnsense_api_base }}/api/haproxy/settings/add_acl"
    method: POST
    url_username: "{{ opnsense_api_key }}"
    url_password: "{{ opnsense_api_secret }}"
    force_basic_auth: true
    validate_certs: false
    body_format: json
    body:
      acl:
        enabled: "1"
        name: "sni_{{ item.name }}"
        expression: "ssl_sni"
        ssl_sni: "{{ item.hostname }}"
        description: "SNI: {{ item.hostname }} — managed by Ansible"
    status_code: [200]
  delegate_to: localhost
  loop: "{{ k3s_services }}"
  when: >-
    'sni_' + item.name not in
    (_hp_acls | dict2items | map(attribute='value.name') | list)
  tags: [opnsense, opnsense-haproxy]

- name: Create SNI ACL for fw.{{ base_domain }}
  ansible.builtin.uri:
    url: "{{ opnsense_api_base }}/api/haproxy/settings/add_acl"
    method: POST
    url_username: "{{ opnsense_api_key }}"
    url_password: "{{ opnsense_api_secret }}"
    force_basic_auth: true
    validate_certs: false
    body_format: json
    body:
      acl:
        enabled: "1"
        name: "sni_fw"
        expression: "ssl_sni"
        ssl_sni: "fw.{{ base_domain }}"
        description: "SNI: fw.{{ base_domain }} — managed by Ansible"
    status_code: [200]
  delegate_to: localhost
  when: "'sni_fw' not in (_hp_acls | dict2items | map(attribute='value.name') | list)"
  tags: [opnsense, opnsense-haproxy]

# =================================================================
# REPAIR: fix existing sni_ ACLs created with "value: <hostname>"
#         instead of "ssl_sni: <hostname>". These produce
#         "CONDITION INVALID / ERROR: missing parameters" in the
#         generated config and prevent HAProxy from starting.
#         Idempotent: only fires when ssl_sni field is empty but
#         the value field (populated by the wrong original call)
#         contains the hostname we need.
# =================================================================

- name: Repair existing sni_ ACLs (populate ssl_sni field)
  ansible.builtin.uri:
    url: "{{ opnsense_api_base }}/api/haproxy/settings/set_acl/{{ item.key }}"
    method: POST
    url_username: "{{ opnsense_api_key }}"
    url_password: "{{ opnsense_api_secret }}"
    force_basic_auth: true
    validate_certs: false
    body_format: json
    body:
      acl:
        ssl_sni: "{{ item.value.value }}"
    status_code: [200]
  delegate_to: localhost
  loop: >-
    {{
      _hp_acls | dict2items
      | selectattr('value.name', 'match', '^sni_')
      | selectattr('value.ssl_sni', 'equalto', '')
      | list
    }}
  when: item.value.value | default('') != ''
  tags: [opnsense, opnsense-haproxy]

- name: Refresh after ACL creation and repair
  ansible.builtin.include_tasks: refresh-normalize.yaml
  tags: [opnsense, opnsense-haproxy]

# =================================================================
# ACTIONS
# NOTE: the correct fields for a use_backend action are:
#   type: "use_backend"       (selects the action type)
#   use_backend: "<uuid>"     (target backend UUID)
#   linkedAcls: "<uuid>"      (ACL UUID, comma-separated for multiple)
#   testType: "if"            (required; "if" or "unless")
# =================================================================

- name: Create use-backend action for each k3s service
  ansible.builtin.uri:
    url: "{{ opnsense_api_base }}/api/haproxy/settings/add_action"
    method: POST
    url_username: "{{ opnsense_api_key }}"
    url_password: "{{ opnsense_api_secret }}"
    force_basic_auth: true
    validate_certs: false
    body_format: json
    body:
      action:
        enabled: "1"
        name: "route_{{ item.name }}"
        testType: "if"
        type: "use_backend"
        use_backend: "{{ _k3s_backend_uuid }}"
        linkedAcls: >-
          {{
            _hp_acls | dict2items
            | selectattr('value.name', 'equalto', 'sni_' + item.name)
            | map(attribute='key') | first
          }}
        description: "Route {{ item.hostname }} -> k3s — managed by Ansible"
    status_code: [200]
  delegate_to: localhost
  loop: "{{ k3s_services }}"
  when: >-
    'route_' + item.name not in
    (_hp_actions | dict2items | map(attribute='value.name') | list)
  tags: [opnsense, opnsense-haproxy]

- name: Create use-backend action for fw -> loopback :8444
  ansible.builtin.uri:
    url: "{{ opnsense_api_base }}/api/haproxy/settings/add_action"
    method: POST
    url_username: "{{ opnsense_api_key }}"
    url_password: "{{ opnsense_api_secret }}"
    force_basic_auth: true
    validate_certs: false
    body_format: json
    body:
      action:
        enabled: "1"
        name: "route_fw"
        testType: "if"
        type: "use_backend"
        use_backend: "{{ _fw_loopback_backend_uuid }}"
        linkedAcls: >-
          {{
            _hp_acls | dict2items
            | selectattr('value.name', 'equalto', 'sni_fw')
            | map(attribute='key') | first
          }}
        description: "Route fw.{{ base_domain }} -> fw HTTPS frontend — managed by Ansible"
    status_code: [200]
  delegate_to: localhost
  when: "'route_fw' not in (_hp_actions | dict2items | map(attribute='value.name') | list)"
  tags: [opnsense, opnsense-haproxy]

# =================================================================
# REPAIR: fix existing route_ actions that were created pointing at
#         the wrong backend (_fw_loopback instead of _k3s_backend).
#         Idempotent: only fires when the action exists but its
#         use_backend selection does not match _k3s_backend_uuid.
# =================================================================

- name: Repair route_ actions pointing at wrong backend
  ansible.builtin.uri:
    url: "{{ opnsense_api_base }}/api/haproxy/settings/set_action/{{ item.key }}"
    method: POST
    url_username: "{{ opnsense_api_key }}"
    url_password: "{{ opnsense_api_secret }}"
    force_basic_auth: true
    validate_certs: false
    body_format: json
    body:
      action:
        use_backend: "{{ _k3s_backend_uuid }}"
    status_code: [200]
  delegate_to: localhost
  # Loop over all route_ actions except route_fw (which correctly targets fw-ssl-loopback).
  # Fire when the currently-selected use_backend UUID is not the k3s-ingress backend.
  loop: >-
    {{
      _hp_actions | dict2items
      | selectattr('value.name', 'match', '^route_(?!fw$)')
      | list
    }}
  when: >-
    (item.value.use_backend | dict2items
     | selectattr('value.selected', 'equalto', 1)
     | map(attribute='key') | list | first | default('')) != _k3s_backend_uuid
  tags: [opnsense, opnsense-haproxy]

- name: Refresh after action creation and repair
  ansible.builtin.include_tasks: refresh-normalize.yaml
  tags: [opnsense, opnsense-haproxy]

# Collect ALL action UUIDs for the :443 frontend.
# Including every action (route_ AND pre-existing like ACME redirect from os-acme)
# ensures we never silently drop actions we did not create.
- name: Build comma-separated action UUID list for :443 frontend (all actions)
  ansible.builtin.set_fact:
    _frontend_action_uuids: >-
      {{
        _hp_actions | dict2items
        | map(attribute='key') | list | join(',')
      }}
  tags: [opnsense, opnsense-haproxy]

# =================================================================
# FRONTENDS
# =================================================================

- name: Create :443 TCP/SNI passthrough frontend
  ansible.builtin.uri:
    url: "{{ opnsense_api_base }}/api/haproxy/settings/add_frontend"
    method: POST
    url_username: "{{ opnsense_api_key }}"
    url_password: "{{ opnsense_api_secret }}"
    force_basic_auth: true
    validate_certs: false
    body_format: json
    body:
      frontend:
        enabled: "1"
        name: "k3s-https"
        bind: "{{ opnsense_lan_ip }}:443"
        mode: "tcp"
        ssl_enabled: "0"
        tcpOptions: "tcp-request inspect-delay 5s\ntcp-request content accept if { req_ssl_hello_type 1 }"
        defaultBackend: "{{ _k3s_backend_uuid }}"
        linkedActions: "{{ _frontend_action_uuids }}"
        description: "HTTPS SNI router — managed by Ansible"
    status_code: [200]
  delegate_to: localhost
  when: "'k3s-https' not in (_hp_frontends | dict2items | map(attribute='value.name') | list)"
  tags: [opnsense, opnsense-haproxy]

# Always update linkedActions on the :443 frontend so that newly added
# route_ actions (and repairs) are wired in — even when the frontend
# already exists and the create task above was skipped.
- name: Look up :443 frontend UUID
  ansible.builtin.set_fact:
    _k3s_https_uuid: >-
      {{
        _hp_frontends | dict2items
        | selectattr('value.name', 'equalto', 'k3s-https')
        | map(attribute='key') | first
      }}
  tags: [opnsense, opnsense-haproxy]

- name: Update :443 frontend linkedActions (idempotent)
  ansible.builtin.uri:
    url: "{{ opnsense_api_base }}/api/haproxy/settings/set_frontend/{{ _k3s_https_uuid }}"
    method: POST
    url_username: "{{ opnsense_api_key }}"
    url_password: "{{ opnsense_api_secret }}"
    force_basic_auth: true
    validate_certs: false
    body_format: json
    body:
      frontend:
        linkedActions: "{{ _frontend_action_uuids }}"
    status_code: [200]
  delegate_to: localhost
  tags: [opnsense, opnsense-haproxy]

- name: Look up fw.{{ base_domain }} cert in OPNsense cert manager (standalone mode)
  ansible.builtin.uri:
    url: "{{ opnsense_api_base }}/api/trust/cert/search"
    method: GET
    url_username: "{{ opnsense_api_key }}"
    url_password: "{{ opnsense_api_secret }}"
    force_basic_auth: true
    validate_certs: false
    return_content: true
  register: _opnsense_certs
  delegate_to: localhost
  when: acme_cert_uuid is not defined
  tags: [opnsense, opnsense-haproxy]

- name: Set fw cert UUID from cert manager lookup (standalone mode)
  ansible.builtin.set_fact:
    acme_cert_uuid: >-
      {{
        _opnsense_certs.json.rows | default([])
        | selectattr('descr', 'search', 'fw\.' + base_domain)
        | map(attribute='refid') | list
        | first | default('')
      }}
  when: acme_cert_uuid is not defined
  tags: [opnsense, opnsense-haproxy]

- name: Create :8444 HTTPS frontend (TLS termination for fw.{{ base_domain }})
  ansible.builtin.uri:
    url: "{{ opnsense_api_base }}/api/haproxy/settings/add_frontend"
    method: POST
    url_username: "{{ opnsense_api_key }}"
    url_password: "{{ opnsense_api_secret }}"
    force_basic_auth: true
    validate_certs: false
    body_format: json
    body:
      frontend:
        enabled: "1"
        name: "fw-https"
        bind: "127.0.0.1:8444"
        mode: "http"
        ssl_enabled: "1"
        ssl_certificates: "{{ acme_cert_uuid }}"
        defaultBackend: "{{ _opnsense_backend_uuid }}"
        description: "fw.{{ base_domain }} TLS termination -> OPNsense :8080 — managed by Ansible"
    status_code: [200]
  delegate_to: localhost
  when:
    - acme_cert_uuid | default('') != ''
    - "'fw-https' not in (_hp_frontends | dict2items | map(attribute='value.name') | list)"
  tags: [opnsense, opnsense-haproxy]

- name: Warn if fw cert is not yet available
  ansible.builtin.debug:
    msg: >-
      WARNING: fw.{{ base_domain }} cert not yet in OPNsense cert manager.
      The :8444 frontend was skipped. Re-run --tags opnsense-haproxy after
      the cert appears in Services -> ACME Client -> Certificates.
  when: acme_cert_uuid | default('') == ''
  tags: [opnsense, opnsense-haproxy]

- name: Create :80 HTTP redirect frontend
  ansible.builtin.uri:
    url: "{{ opnsense_api_base }}/api/haproxy/settings/add_frontend"
    method: POST
    url_username: "{{ opnsense_api_key }}"
    url_password: "{{ opnsense_api_secret }}"
    force_basic_auth: true
    validate_certs: false
    body_format: json
    body:
      frontend:
        enabled: "1"
        name: "http-redirect"
        bind: "{{ opnsense_lan_ip }}:80"
        mode: "http"
        ssl_enabled: "0"
        defaultBackend: ""
        customOptions: "redirect scheme https code 301"
        description: "HTTP -> HTTPS redirect — managed by Ansible"
    status_code: [200]
  delegate_to: localhost
  when: "'http-redirect' not in (_hp_frontends | dict2items | map(attribute='value.name') | list)"
  tags: [opnsense, opnsense-haproxy]

# =================================================================
# ENABLE AND APPLY
# =================================================================

- name: Enable HAProxy service
  ansible.builtin.uri:
    url: "{{ opnsense_api_base }}/api/haproxy/maintenance/set"
    method: POST
    url_username: "{{ opnsense_api_key }}"
    url_password: "{{ opnsense_api_secret }}"
    force_basic_auth: true
    validate_certs: false
    body_format: json
    body:
      haproxy:
        enabled: "1"
    status_code: [200]
  delegate_to: localhost
  tags: [opnsense, opnsense-haproxy]

- name: Apply HAProxy configuration
  ansible.builtin.uri:
    url: "{{ opnsense_api_base }}/api/haproxy/service/reconfigure"
    method: POST
    url_username: "{{ opnsense_api_key }}"
    url_password: "{{ opnsense_api_secret }}"
    force_basic_auth: true
    validate_certs: false
    body_format: json
    body: {}
    status_code: [200]
  delegate_to: localhost
  tags: [opnsense, opnsense-haproxy]

- name: Print HAProxy configuration summary
  ansible.builtin.debug:
    msg:
      - "HAProxy configured:"
      - "  :443  — SNI passthrough (k3s) + fw loopback"
      - "  :8444 — TLS termination for fw.{{ base_domain }}"
      - "  :80   — HTTP -> HTTPS redirect"
  tags: [opnsense, opnsense-haproxy]
