---
# roles/local-path/defaults/main.yaml

local_path_namespace: local-path-storage
local_path_version: "v0.0.30"   # https://github.com/rancher/local-path-provisioner/releases
                                  # used to pin the upstream manifest URL

# Root directory on each node where local-path volumes are created.
# Placed on sdb (mounted at /var/lib/longhorn) to keep off the OS disk.
# local-path-provisioner creates per-PVC subdirectories here automatically.
local_path_data_dir: /var/lib/longhorn/local-path

# StorageClass name — referenced explicitly by CNPG and any other role
# that wants node-local storage. Does NOT become the cluster default;
# Longhorn remains default.
local_path_storage_class: local-path
