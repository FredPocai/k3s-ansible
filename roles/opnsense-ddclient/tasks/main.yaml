---
# roles/opnsense-ddclient/tasks/main.yaml
#
# Installs os-ddclient and configures it to update Cloudflare DNS
# with the current WAN IP for one or more public hostnames.
#
# Requires:
#   opnsense_api_key, opnsense_api_secret  — vault
#   cloudflare_api_token                   — vault
#   cloudflare_zone_id                     — vault (hex Zone ID)
#   cloudflare_zone_name                   — group_vars (root domain, e.g. "pocai.net")
#   opnsense_ddns_hosts                    — list of FQDNs, group_vars
#   opnsense_wan_interface                 — group_vars (default: wan)
#
# API notes (os-ddclient plugin, OPNsense 24.x/26.x):
#   List:   GET  /api/ddclient/accounts/searchAccount
#   Create: POST /api/ddclient/accounts/addAccount
#   Apply:  POST /api/ddclient/service/reconfigure
#
#   NOTE: the /api/dyndns/ path is the OLD built-in service stub — it does NOT
#   work without os-ddclient installed, and even then os-ddclient exposes its
#   own /api/ddclient/ namespace. Always use /api/ddclient/.
#
#   For the Cloudflare service in os-ddclient:
#     account.username  = zone root domain (e.g. "pocai.net") — NOT the hex Zone ID
#     account.password  = Cloudflare API Token
#     account.hostnames = FQDN to update (e.g. "home.pocai.net")
#
# Pre-flight (Cloudflare API direct):
#   ddclient's Cloudflare driver GETs the existing record by ID before PATCHing.
#   If no A record exists it fails: "No 'A' record at Cloudflare".
#   We pre-create placeholder records (0.0.0.0) via the CF REST API so ddclient
#   finds them on first run and immediately overwrites with the real WAN IP.
#
#   IMPORTANT: CF record lookup uses query-string parameters, NOT a request body.
#   Using body_format+body on a GET silently ignores the filter and may return
#   all records, causing the existence check to give wrong results.
#
# Tags: opnsense, opnsense-ddclient

# -- Install plugin ------------------------------------------------

- name: Get list of installed packages/plugins
  ansible.builtin.uri:
    url: "{{ opnsense_api_base }}/api/core/firmware/packages"
    method: GET
    url_username: "{{ opnsense_api_key }}"
    url_password: "{{ opnsense_api_secret }}"
    force_basic_auth: true
    validate_certs: false
    return_content: true
  register: _firmware_packages
  delegate_to: localhost
  tags: [opnsense, opnsense-ddclient]

- name: Set fact — installed package name list
  ansible.builtin.set_fact:
    _installed_pkg_names: >-
      {{ _firmware_packages.json.rows | default([]) | map(attribute='name') | list }}
  tags: [opnsense, opnsense-ddclient]

- name: Install os-ddclient (if not present)
  ansible.builtin.uri:
    url: "{{ opnsense_api_base }}/api/core/firmware/install/os-ddclient"
    method: POST
    url_username: "{{ opnsense_api_key }}"
    url_password: "{{ opnsense_api_secret }}"
    force_basic_auth: true
    validate_certs: false
    body: ""
    status_code: [200]
  delegate_to: localhost
  when: "'os-ddclient' not in _installed_pkg_names"
  register: _ddclient_install
  tags: [opnsense, opnsense-ddclient]

- name: Wait for plugin install to settle
  ansible.builtin.pause:
    seconds: 45
    prompt: "Waiting for os-ddclient installation to complete..."
  when: _ddclient_install.changed
  tags: [opnsense, opnsense-ddclient]

# -- Pre-flight: ensure Cloudflare A records exist -----------------
# Uses query-string parameters for filtering (CF API does not support
# JSON body filtering on GET requests).

- name: Check whether Cloudflare A record exists for each hostname
  ansible.builtin.uri:
    url: "https://api.cloudflare.com/client/v4/zones/{{ cloudflare_zone_id }}/dns_records\
?type=A&name={{ item | urlencode }}"
    method: GET
    headers:
      Authorization: "Bearer {{ cloudflare_api_token }}"
      Content-Type: "application/json"
    return_content: true
    status_code: [200]
  register: _cf_record_check
  loop: "{{ opnsense_ddns_hosts }}"
  delegate_to: localhost
  no_log: true
  tags: [opnsense, opnsense-ddclient]

- name: Pre-create Cloudflare A record (placeholder 0.0.0.0) if missing
  ansible.builtin.uri:
    url: "https://api.cloudflare.com/client/v4/zones/{{ cloudflare_zone_id }}/dns_records"
    method: POST
    headers:
      Authorization: "Bearer {{ cloudflare_api_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      type: "A"
      name: "{{ item.item }}"
      content: "0.0.0.0"
      ttl: 120
      proxied: false
      comment: "placeholder — ddclient will update with real WAN IP"
    return_content: true
    status_code: [200]
  loop: "{{ _cf_record_check.results }}"
  loop_control:
    label: "{{ item.item }}"
  delegate_to: localhost
  no_log: true
  when: item.json.result | default([]) | length == 0
  tags: [opnsense, opnsense-ddclient]

# -- Configure os-ddclient accounts --------------------------------

- name: Get existing ddclient accounts
  ansible.builtin.uri:
    url: "{{ opnsense_api_base }}/api/ddclient/accounts/searchAccount"
    method: GET
    url_username: "{{ opnsense_api_key }}"
    url_password: "{{ opnsense_api_secret }}"
    force_basic_auth: true
    validate_certs: false
    return_content: true
  register: _ddns_existing
  delegate_to: localhost
  tags: [opnsense, opnsense-ddclient]

- name: Create Cloudflare DynDNS account for each public hostname
  ansible.builtin.uri:
    url: "{{ opnsense_api_base }}/api/ddclient/accounts/addAccount"
    method: POST
    url_username: "{{ opnsense_api_key }}"
    url_password: "{{ opnsense_api_secret }}"
    force_basic_auth: true
    validate_certs: false
    body_format: json
    body:
      account:
        enabled: "1"
        service: "Cloudflare"
        # username = zone root domain (e.g. "pocai.net") — NOT the hex Zone ID.
        # The ddclient Cloudflare driver maps this to its 'zone' parameter.
        username: "{{ cloudflare_zone_name }}"
        password: "{{ cloudflare_api_token }}"
        hostnames: "{{ item }}"
        interface: "{{ opnsense_wan_interface | default('wan') }}"
        description: "WAN DynDNS {{ item }} — managed by Ansible"
    status_code: [200]
  delegate_to: localhost
  no_log: true
  loop: "{{ opnsense_ddns_hosts }}"
  when: >-
    _ddns_existing.json.rows | default([])
    | selectattr('hostnames', 'equalto', item)
    | list | length == 0
  tags: [opnsense, opnsense-ddclient]

# -- Apply and enable ----------------------------------------------

- name: Apply ddclient configuration
  ansible.builtin.uri:
    url: "{{ opnsense_api_base }}/api/ddclient/service/reconfigure"
    method: POST
    url_username: "{{ opnsense_api_key }}"
    url_password: "{{ opnsense_api_secret }}"
    force_basic_auth: true
    validate_certs: false
    body_format: json
    body: {}
    status_code: [200]
  delegate_to: localhost
  tags: [opnsense, opnsense-ddclient]

- name: Print ddclient summary
  ansible.builtin.debug:
    msg:
      - "os-ddclient configured."
      - "  Service:   Cloudflare"
      - "  Zone:      {{ cloudflare_zone_name }}"
      - "  Interface: {{ opnsense_wan_interface | default('wan') }}"
      - "  Hostnames: {{ opnsense_ddns_hosts | join(', ') }}"
      - "  A records pre-created in Cloudflare (placeholder 0.0.0.0)."
      - "  ddclient will update with real WAN IP within ~5 minutes."
  tags: [opnsense, opnsense-ddclient]
