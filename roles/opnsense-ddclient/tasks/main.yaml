# -- Configure Dynamic DNS accounts --------------------------------

- name: Get existing ddclient accounts
  ansible.builtin.uri:
    url: "{{ opnsense_api_base }}/api/dyndns/accounts/get"
    method: GET
    user: "{{ opnsense_api_key }}"
    password: "{{ opnsense_api_secret }}"
    force_basic_auth: true
    validate_certs: false
    return_content: true
  register: _ddns_existing
  delegate_to: localhost
  tags: [opnsense, opnsense-ddclient]

- name: Create Cloudflare DynDNS account for each public hostname
  ansible.builtin.uri:
    url: "{{ opnsense_api_base }}/api/dyndns/accounts/add_item"
    method: POST
    user: "{{ opnsense_api_key }}"
    password: "{{ opnsense_api_secret }}"
    force_basic_auth: true
    validate_certs: false
    body_format: json
    body:
      account:
        enabled: "1"
        service: "cloudflare"
        # username = Cloudflare Zone ID (required by ddclient Cloudflare driver)
        username: "token"
        # password = Cloudflare API Token
        password: "{{ cloudflare_api_token }}"
        hostnames: "{{ item }}"
        zone: "{{ base_domain }}"
        interface: "{{ opnsense_wan_interface | default('wan') }}"
        description: "WAN DynDNS {{ item }} — managed by Ansible"
        checkip: if
    status_code: [200]
  delegate_to: localhost
  no_log: true
  loop: "{{ opnsense_ddns_hosts }}"
  when: >-
    _ddns_existing.json.rows | default([])
    | selectattr('hostnames', 'equalto', item)
    | list | length == 0
  tags: [opnsense, opnsense-ddclient]
  register: _ddns_create
- debug: var=_ddns_create
# -- Apply and enable ----------------------------------------------

- name: Apply ddclient configuration
  ansible.builtin.uri:
    url: "{{ opnsense_api_base }}/api/dyndns/service/reconfigure"
    method: POST
    user: "{{ opnsense_api_key }}"
    password: "{{ opnsense_api_secret }}"
    force_basic_auth: true
    validate_certs: false
    body_format: json
    body: {}
    status_code: [200]
  delegate_to: localhost
  tags: [opnsense, opnsense-ddclient]

- name: Print ddclient summary
  ansible.builtin.debug:
    msg:
      - "os-ddclient configured."
      - "  Service:   Cloudflare"
      - "  Interface: {{ opnsense_wan_interface | default('wan') }}"
      - "  Hostnames:"
      - "{% for h in opnsense_ddns_hosts %}    - {{ h }}{% endfor %}"
  tags: [opnsense, opnsense-ddclient]
