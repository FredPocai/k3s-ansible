# ---
# # roles/opnsense-ddclient/tasks/main.yaml
# #
# # Installs os-ddclient and configures it to update Cloudflare DNS
# # with the current WAN IP for one or more public hostnames.
# #
# # Despite earlier attempts to use the OPNsense built-in Dynamic DNS
# # (/api/dyndns/) endpoint, that API is only exposed by the os-ddclient
# # plugin itself. Without the plugin installed, the endpoint returns 404.
# # There is no usable built-in DynDNS service independent of os-ddclient.
# #
# # Requires:
# #   opnsense_api_key, opnsense_api_secret  — vault
# #   cloudflare_api_token                   — vault
# #   opnsense_ddns_hosts                    — list of FQDNs, group_vars
# #   opnsense_wan_interface                 — group_vars (default: wan)
# #
# # API notes (os-ddclient plugin, OPNsense 24.x/26.x):
# #   List accounts:   GET  /api/dyndns/accounts/searchAccount
# #   Create account:  POST /api/dyndns/accounts/addAccount
# #   Apply config:    POST /api/dyndns/service/reconfigure
# #
# #   The Cloudflare service identifier in os-ddclient is "Cloudflare".
# #   username field: Cloudflare Zone ID (not e-mail)
# #   password field: Cloudflare API Token
# #
# # Tags: opnsense, opnsense-ddclient

