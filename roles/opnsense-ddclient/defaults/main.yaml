---
# roles/opnsense-ddclient/defaults/main.yaml

# WAN interface as shown in OPNsense GUI -> Interfaces -> Assignments.
opnsense_wan_interface: "wan"

# List of public FQDNs to keep updated with the current WAN IP.
# Example:
#   opnsense_ddns_hosts:
#     - "home.pocai.net"
opnsense_ddns_hosts: []

# cloudflare_zone_name: root domain managed in Cloudflare (e.g. "pocai.net").
# This is the human-readable name used as ddclient's 'zone' parameter —
# NOT the hex Zone ID (that goes in vault as cloudflare_zone_id).
# Set in group_vars/all.yaml:
#   cloudflare_zone_name: "pocai.net"
