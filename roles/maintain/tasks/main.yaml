---
# roles/maintain/tasks/main.yaml
#
# Safe rolling maintenance for k3s nodes.
# Run with:
#   ansible-playbook -i inventory/hosts.yaml maintain.yaml
#
# Node state detection (in order of precedence):
#   1. k3s binary absent           → nothing to uninstall, skip to apt
#   2. k3s binary present but node is NOT a healthy cluster member
#      (service inactive, NotReady, or kubectl errors) → run k3s-uninstall.sh + reboot
#   3. k3s binary present and node IS a healthy cluster member
#      and updates available → cordon, drain, upgrade, reboot, uncordon
#   4. Up to date                  → apt housekeeping only

# ── Step 1: Check for available upgrades ──────────────────────────
- name: Update apt cache
  apt:
    update_cache: true
    cache_valid_time: 0

- name: Check for upgradable packages
  command: apt list --upgradable
  register: apt_upgradable
  changed_when: false

- name: Set fact — upgrades available
  set_fact:
    updates_available: "{{ apt_upgradable.stdout_lines | length > 1 }}"

- name: Report upgrade status
  debug:
    msg: "{{ 'Updates available — will upgrade and reboot.' if updates_available else 'System is up to date.' }}"

# ── Step 2: Determine node state ──────────────────────────────────
- name: Check if k3s binary exists
  stat:
    path: /usr/local/bin/k3s
  register: k3s_bin

- name: Check if k3s service is active
  command: systemctl is-active k3s
  register: k3s_svc
  changed_when: false
  failed_when: false
  when: k3s_bin.stat.exists

# The definitive cluster membership test:
# Ask the API server whether THIS node appears as Ready.
# This catches all broken states: service up but NotReady, etcd not
# formed, partial install, prior failed playbook run, etc.
- name: Check if this node is Ready in the cluster
  command: >
    kubectl get node {{ inventory_hostname }}
    --no-headers
    -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}'
  register: k3s_node_ready
  changed_when: false
  failed_when: false
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  when: k3s_bin.stat.exists

- name: Set fact — node is a healthy cluster member
  set_fact:
    k3s_healthy: >-
      {{
        k3s_bin.stat.exists
        and (k3s_svc.stdout | default('')) == 'active'
        and (k3s_node_ready.stdout | default('')) == 'True'
      }}

- name: Set fact — k3s present but unhealthy (needs uninstall)
  set_fact:
    k3s_needs_uninstall: >-
      {{
        k3s_bin.stat.exists
        and not k3s_healthy
      }}

- name: Report node k3s state
  debug:
    msg: >-
      k3s state on {{ inventory_hostname }}:
      binary={{ k3s_bin.stat.exists }},
      service={{ k3s_svc.stdout | default('n/a') }},
      node_ready={{ k3s_node_ready.stdout | default('n/a') }},
      healthy={{ k3s_healthy }},
      needs_uninstall={{ k3s_needs_uninstall }}

# ── Step 3a: Unhealthy — uninstall and reboot ─────────────────────
- name: Run k3s-uninstall.sh (binary present but node not healthy)
  command: /usr/local/bin/k3s-uninstall.sh
  when: k3s_needs_uninstall
  notify: Reboot and wait

- name: Flush handlers — reboot after uninstall before continuing
  meta: flush_handlers
  when: k3s_needs_uninstall

# ── Step 3b: Healthy — cordon and drain before upgrade ────────────
- name: Cordon node (mark unschedulable)
  command: kubectl cordon {{ inventory_hostname }}
  delegate_to: "{{ groups['k3s_init'][0] }}"
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  when:
    - k3s_healthy
    - updates_available

- name: Drain node (evict pods gracefully)
  command: >
    kubectl drain {{ inventory_hostname }}
    --ignore-daemonsets
    --delete-emptydir-data
    --grace-period=60
    --timeout=300s
  delegate_to: "{{ groups['k3s_init'][0] }}"
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  when:
    - k3s_healthy
    - updates_available

# ── Step 4: apt upgrade ────────────────────────────────────────────
- name: Run apt full-upgrade
  apt:
    upgrade: full
    autoremove: false
  when: updates_available
  notify: Reboot and wait

- name: Flush handlers — reboot after upgrade before uncordon
  meta: flush_handlers
  when: updates_available

# ── Step 5: Post-reboot — wait for k3s, then uncordon ─────────────
- name: Wait for k3s service to be active after reboot
  systemd:
    name: k3s
  register: k3s_post_reboot
  until: k3s_post_reboot.status.ActiveState == "active"
  retries: 20
  delay: 15
  when:
    - k3s_healthy
    - updates_available

- name: Wait for node to report Ready after reboot
  command: >
    kubectl wait node/{{ inventory_hostname }}
    --for=condition=Ready
    --timeout=180s
  delegate_to: "{{ groups['k3s_init'][0] }}"
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  when:
    - k3s_healthy
    - updates_available

- name: Uncordon node (return to scheduling)
  command: kubectl uncordon {{ inventory_hostname }}
  delegate_to: "{{ groups['k3s_init'][0] }}"
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  when:
    - k3s_healthy
    - updates_available

# ── Step 6: apt housekeeping ───────────────────────────────────────
- name: apt autoremove
  apt:
    autoremove: true

- name: apt autoclean
  command: apt-get autoclean -y
  changed_when: false

- name: Report maintenance complete
  debug:
    msg: "Maintenance complete on {{ inventory_hostname }}."
