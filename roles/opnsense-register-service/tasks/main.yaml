---
# roles/opnsense-register-service/tasks/main.yaml
#
# Registers a single service into the OPNsense stack:
#   1. Unbound host override   (always)
#   2. HAProxy SNI ACL         (always)
#   3. HAProxy use-backend action (always)
#   4. HAProxy reconfigure     (always)
#   5. ACME certificate entry  (when service.acme_cert | default(true))
#   6. Cloudflare A record     (when service.public | default(false))
#   7. NAT portforward         (when service.public | default(false))
#   8. Firewall allow rule     (when service.public | default(false))
#
# Expects variable: service (dict) — see defaults/main.yaml for schema.
# All tasks delegate_to: localhost.
# Tags: opnsense, register-service

- name: Validate required service fields
  ansible.builtin.assert:
    that:
      - service.name is defined
      - service.hostname is defined
    fail_msg: "service.name and service.hostname are both required."
  tags: [opnsense, register-service]

- name: Set service fact defaults
  ansible.builtin.set_fact:
    _svc_name: "{{ service.name }}"
    _svc_host: "{{ service.hostname }}"
    _svc_public: "{{ service.public | default(false) | bool }}"
    _svc_backend_ip: "{{ service.backend_ip | default(opnsense_lan_ip) }}"
    _svc_backend_port: "{{ service.backend_port | default(443) }}"
    _svc_acme_cert: "{{ service.acme_cert | default(true) | bool }}"
  tags: [opnsense, register-service]

# =================================================================
# 1. UNBOUND
# =================================================================

- name: Get existing Unbound host overrides
  ansible.builtin.uri:
    url: "{{ opnsense_api_base }}/api/unbound/settings/search_host_override"
    method: GET
    url_username: "{{ opnsense_api_key }}"
    url_password: "{{ opnsense_api_secret }}"
    force_basic_auth: true
    validate_certs: false
    return_content: true
  register: _unbound_existing
  delegate_to: localhost
  tags: [opnsense, register-service]

