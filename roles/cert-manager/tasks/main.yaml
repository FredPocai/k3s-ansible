---
# roles/cert-manager/tasks/main.yaml
#
# Installs cert-manager and configures Cloudflare DNS-01 ACME for homelab.internal.
#
# Two ClusterIssuers are created:
#   letsencrypt-staging    — use this first; untrusted cert but no rate limits
#   letsencrypt-production — switch to this once staging validates successfully
#
# To use on an Ingress, annotate with:
#   cert-manager.io/cluster-issuer: letsencrypt-staging
# and add a tls block:
#   tls:
#     - hosts:
#         - myservice.homelab.internal
#       secretName: myservice-tls
#
# Switch to letsencrypt-production once you've confirmed staging works.

- name: Only run cert-manager install from init node
  when: inventory_hostname in groups['k3s_init']
  block:

    - name: Add cert-manager Helm repo
      ansible.builtin.command: helm repo add jetstack https://charts.jetstack.io
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: repo_add
      changed_when: '"already exists" not in repo_add.stdout'

    - name: Update Helm repos
      ansible.builtin.command: helm repo update
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      changed_when: false

    - name: Deploy cert-manager via Helm
      ansible.builtin.command: >
        helm upgrade --install cert-manager jetstack/cert-manager
        --namespace cert-manager
        --create-namespace
        --set crds.enabled=true
        --wait --timeout 5m
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    - name: Wait for cert-manager webhook to be ready
      ansible.builtin.command: >
        kubectl rollout status deployment/cert-manager-webhook
        -n cert-manager --timeout=120s
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    # Extra pause — the webhook registers its API endpoint asynchronously.
    # Applying ClusterIssuers too quickly results in "connection refused" from
    # the validating webhook. 15s is enough in practice.
    - name: Wait for cert-manager webhook to finish registering
      ansible.builtin.pause:
        seconds: 15

    - name: Create Cloudflare API token Secret
      ansible.builtin.shell: |
        kubectl apply -f - <<EOF
        apiVersion: v1
        kind: Secret
        metadata:
          name: cloudflare-api-token
          namespace: cert-manager
        type: Opaque
        stringData:
          api-token: "{{ cloudflare_api_token }}"
        EOF
      args:
        executable: /bin/bash
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      no_log: true   # don't print the token to Ansible output

    - name: Create letsencrypt-staging ClusterIssuer
      ansible.builtin.shell: |
        kubectl apply -f - <<EOF
        apiVersion: cert-manager.io/v1
        kind: ClusterIssuer
        metadata:
          name: letsencrypt-staging
        spec:
          acme:
            server: https://acme-staging-v02.api.letsencrypt.org/directory
            email: acme-certs@fred.homelab.internal
            privateKeySecretRef:
              name: letsencrypt-staging-account-key
            solvers:
              - dns01:
                  cloudflare:
                    apiTokenSecretRef:
                      name: cloudflare-api-token
                      key: api-token
                selector:
                  dnsZones:
                    - homelab.internal
        EOF
      args:
        executable: /bin/bash
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    - name: Create letsencrypt-production ClusterIssuer
      ansible.builtin.shell: |
        kubectl apply -f - <<EOF
        apiVersion: cert-manager.io/v1
        kind: ClusterIssuer
        metadata:
          name: letsencrypt-production
        spec:
          acme:
            server: https://acme-v02.api.letsencrypt.org/directory
            email: acme-certs@fred.homelab.internal
            privateKeySecretRef:
              name: letsencrypt-production-account-key
            solvers:
              - dns01:
                  cloudflare:
                    apiTokenSecretRef:
                      name: cloudflare-api-token
                      key: api-token
                selector:
                  dnsZones:
                    - homelab.internal
        EOF
      args:
        executable: /bin/bash
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    - name: Wait for ClusterIssuers to be ready
      ansible.builtin.command: >
        kubectl wait clusterissuer/letsencrypt-staging
        clusterissuer/letsencrypt-production
        --for=condition=Ready
        --timeout=120s
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    - name: Verify ClusterIssuers
      ansible.builtin.command: kubectl get clusterissuer
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: issuer_status
      changed_when: false

    - name: Print ClusterIssuer status
      ansible.builtin.debug:
        msg: "{{ issuer_status.stdout_lines }}"
