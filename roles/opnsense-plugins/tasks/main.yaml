---
# roles/opnsense-plugins/tasks/main.yaml
#
# Installs required OPNsense plugins and suppresses stale GUI warnings.
#
# Plugins managed:
#   os-haproxy     — load balancer / SNI router  (required by opnsense-haproxy)
#   os-acme-client — ACME / Let's Encrypt        (required by opnsense-acme)
#
# Note: os-ddclient is installed and configured by the opnsense-ddclient role.
#
# Stale plugins suppressed (no-op if not present):
#   os-caddy — replaced by HAProxy; suppresses "missing plugin" GUI warning
#
# API notes:
#   Detection: GET /api/core/firmware/info -> {"rows": [...]}
#              (NOT /api/core/firmware/info which returns product metadata only)
#   Install:   POST /api/core/firmware/install/<name>  body: ""
#   Remove:    POST /api/core/firmware/remove/<name>   body: ""
#
# Tags: opnsense, opnsense-plugins

- name: Get list of installed packages/plugins
  ansible.builtin.uri:
    url: "{{ opnsense_api_base }}/api/core/firmware/info"
    method: GET
    url_username: "{{ opnsense_api_key }}"
    url_password: "{{ opnsense_api_secret }}"
    force_basic_auth: true
    validate_certs: false
    return_content: true
  register: _firmware_packages
  delegate_to: localhost
  tags: [opnsense, opnsense-plugins]

- name: Set fact — installed package name list
  ansible.builtin.set_fact:
    _installed_pkg_names: >-
      {{ _firmware_packages.json.rows | default([]) | map(attribute='name') | list }}
  tags: [opnsense, opnsense-plugins]

- name: Install os-haproxy (if not present)
  ansible.builtin.uri:
    url: "{{ opnsense_api_base }}/api/core/firmware/install/os-haproxy"
    method: POST
    url_username: "{{ opnsense_api_key }}"
    url_password: "{{ opnsense_api_secret }}"
    force_basic_auth: true
    validate_certs: false
    body: ""
    status_code: [200]
  delegate_to: localhost
  when: "'os-haproxy' not in _installed_pkg_names"
  register: _haproxy_install
  tags: [opnsense, opnsense-plugins]

- name: Install os-acme-client (if not present)
  ansible.builtin.uri:
    url: "{{ opnsense_api_base }}/api/core/firmware/install/os-acme-client"
    method: POST
    url_username: "{{ opnsense_api_key }}"
    url_password: "{{ opnsense_api_secret }}"
    force_basic_auth: true
    validate_certs: false
    body: ""
    status_code: [200]
  delegate_to: localhost
  when: "'os-acme-client' not in _installed_pkg_names"
  register: _acme_install
  tags: [opnsense, opnsense-plugins]

- name: Wait for plugin installs to settle (firmware ops are async)
  ansible.builtin.pause:
    seconds: 60
    prompt: "Waiting for OPNsense plugin installation to complete..."
  when: _haproxy_install.changed or _acme_install.changed
  tags: [opnsense, opnsense-plugins]

- name: Remove stale os-caddy plugin stub (suppress GUI warning)
  ansible.builtin.uri:
    url: "{{ opnsense_api_base }}/api/core/firmware/remove/os-caddy"
    method: POST
    url_username: "{{ opnsense_api_key }}"
    url_password: "{{ opnsense_api_secret }}"
    force_basic_auth: true
    validate_certs: false
    body: ""
    status_code: [200]
  delegate_to: localhost
  when:
    - opnsense_remove_stale_plugins | default(true)
    - "'os-caddy' not in _installed_pkg_names"
  ignore_errors: true
  tags: [opnsense, opnsense-plugins]
