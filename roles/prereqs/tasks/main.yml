---
# roles/prereqs/tasks/main.yml
# System preparation: packages, kernel params, disk setup, storage interface

- name: Set hostname to inventory name
  hostname:
    name: "{{ inventory_hostname }}"

- name: Update /etc/hosts with cluster nodes
  blockinfile:
    path: /etc/hosts
    marker: "# {mark} k3s cluster nodes"
    block: |
      {% for s in k3s_nodes %}
      {{ s.ip }} {{ s.name }} {{ s.name }}.{{ base_domain }}
      {% endfor %}

- name: Install required packages
  apt:
    name:
      - open-iscsi      # required by Longhorn
      - nfs-common      # NFS client for TrueNAS mounts
      - cryptsetup      # required by Longhorn
      - curl
      - jq
      - util-linux
      - e2fsprogs
    state: present
    update_cache: true

- name: Enable and start iscsid (required by Longhorn)
  systemd:
    name: iscsid
    enabled: true
    state: started

- name: Load required kernel modules
  modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - iscsi_tcp
    - overlay
    - br_netfilter

- name: Persist kernel modules across reboots
  copy:
    dest: /etc/modules-load.d/k3s.conf
    content: |
      iscsi_tcp
      overlay
      br_netfilter

- name: Set required sysctl parameters
  sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    sysctl_set: true
    state: present
    reload: true
  loop:
    - { name: "net.bridge.bridge-nf-call-iptables",  value: "1" }
    - { name: "net.bridge.bridge-nf-call-ip6tables", value: "1" }
    - { name: "net.ipv4.ip_forward",                 value: "1" }
    - { name: "net.ipv4.conf.all.rp_filter",         value: "0" }  # required by Calico
    - { name: "net.ipv4.conf.default.rp_filter",     value: "0" }  # required by Calico

# ── Network interfaces — static IPv4 ─────────────────────────────
# Both interfaces are configured statically. DHCP is disabled on both
# to prevent DHCP-advertised DNS servers from leaking into systemd-resolved
# and subsequently into pod DNS config via CoreDNS.
#
# IPv6 is left as-is (SLAAC via RA) on enp6s18 — no changes to IPv6.
# enp6s19 (storage) is IPv4-only; no IPv6 needed on storage network.
#
# We write a single netplan file covering both interfaces and remove the
# old 70-dnssuffix.yaml if it exists.

- name: Remove legacy 70-dnssuffix.yaml if present
  ansible.builtin.file:
    path: /etc/netplan/70-dnssuffix.yaml
    state: absent
  notify: Apply netplan

- name: Remove legacy 60-storage.yaml if present
  ansible.builtin.file:
    path: /etc/netplan/60-storage.yaml
    state: absent
  notify: Apply netplan

- name: Configure static IPv4 on both interfaces via netplan
  ansible.builtin.copy:
    dest: /etc/netplan/60-k3s-static.yaml
    mode: "0600"
    content: |
      network:
        version: 2
        ethernets:
          {{ k3s_iface }}:
            dhcp4: false
            dhcp6: false
            accept-ra: true
            addresses:
              - {{ k3s_static_ip }}/24
            routes:
              - to: default
                via: {{ k3s_gateway }}
            nameservers:
              addresses:
                - {{ opnsense_host }}
              search: []
          {{ storage_iface }}:
            dhcp4: false
            dhcp6: false
            accept-ra: false
            addresses:
              - {{ k3s_storage_ip }}/24
            nameservers:
              addresses:
                - {{ opnsense_host }}
              search: []
  notify: Apply netplan

- name: Flush handlers (apply netplan immediately)
  meta: flush_handlers

# ── Longhorn aux disk (/dev/sdb) ──────────────────────────────────
- name: Check if /dev/sdb already has a filesystem
  command: blkid -s TYPE -o value /dev/sdb
  register: sdb_fs
  changed_when: false
  failed_when: false

- name: Create ext4 filesystem on /dev/sdb (if blank)
  filesystem:
    fstype: ext4
    dev: "{{ longhorn_aux_device }}"
  when: sdb_fs.stdout == ""

- name: Create Longhorn data directory
  file:
    path: "{{ longhorn_data_path }}"
    state: directory
    mode: "0755"

- name: Mount /dev/sdb at Longhorn data path
  mount:
    path: "{{ longhorn_data_path }}"
    src: "{{ longhorn_aux_device }}"
    fstype: ext4
    opts: defaults,noatime
    state: mounted   # also adds to /etc/fstab
