# vault/secrets.yml
#
# !! ENCRYPT THIS FILE BEFORE COMMITTING TO A REPO !!
#
# To encrypt:
#   ansible-vault encrypt vault/secrets.yml
#
# To edit after encrypting:
#   ansible-vault edit vault/secrets.yml
#
# To run a playbook with vault:
#   ansible-playbook -i inventory/hosts.yml site.yml --ask-vault-pass
#   or with a password file:
#   ansible-playbook -i inventory/hosts.yml site.yml --vault-password-file ~/.vault_pass
#
# ── Cloudflare ────────────────────────────────────────────────────
# Scoped API token — create at https://dash.cloudflare.com/profile/api-tokens
# Required permissions:
#   Zone > DNS > Edit       (for zone: homelab.internal)
#   Zone > Zone > Read      (for zone: homelab.internal)
cloudflare_api_token: "REPLACE_WITH_YOUR_CLOUDFLARE_SCOPED_TOKEN"

# ── OPNsense API ──────────────────────────────────────────────────
# Create at: OPNsense GUI → System → Access → Users → your user → API keys
# The API user needs the 'Unbound DNS' privilege at minimum.
opnsense_api_key: "REPLACE_WITH_YOUR_OPNSENSE_API_KEY"
opnsense_api_secret: "REPLACE_WITH_YOUR_OPNSENSE_API_SECRET"
