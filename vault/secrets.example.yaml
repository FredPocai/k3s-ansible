# vault/secrets.example.yaml
#
# !! ENCRYPT BEFORE COMMITTING !!
#
#   ansible-vault encrypt vault/secrets.yaml
#   ansible-vault edit   vault/secrets.yaml
#
# Run with:
#   ansible-playbook -i inventory/hosts.yaml site.yaml --ask-vault-pass

# ── Cloudflare ────────────────────────────────────────────────────
cloudflare_api_token: "REPLACE_WITH_CLOUDFLARE_RESTRICTED_API_TOKEN"
cloudflare_account_id: "REPLACE_WITH_CLOUDFLARE_ACCOUNT_ID"
cloudflare_zone_id: "REPLACE_WITH_CLOUDFLARE_ZONE_ID"

# ── OPNsense API ──────────────────────────────────────────────────
opnsense_api_key: "REPLACE_WITH_OPNSENSE_API_KEY"
opnsense_api_secret: "REPLACE_WITH_OPNSENSE_API_SECRET"

# ── Authentik IdP ─────────────────────────────────────────────────
# authentik_secret_key: random 50-char string used for signing cookies/tokens.
# Generate with: python3 -c "import secrets; print(secrets.token_urlsafe(50))"
authentik_secret_key: "REPLACE_WITH_50_CHAR_RANDOM_STRING"

# PostgreSQL password for the authentik database user.
authentik_pg_password: "REPLACE_WITH_STRONG_PASSWORD"

# Bootstrap credentials — used only on first deploy to create the akadmin user.
# Change the password via the Authentik admin UI after first login.
authentik_bootstrap_email: "admin@example.com"
authentik_bootstrap_password: "REPLACE_WITH_STRONG_PASSWORD"

# Static API token for Ansible → Authentik API automation.
# Set BEFORE first Authentik deploy — Authentik creates the token on startup.
# Used to configure OIDC providers, applications, and groups without manual UI steps.
# Generate: python3 -c "import secrets; print(secrets.token_urlsafe(32))"
authentik_bootstrap_token: "REPLACE_WITH_LONG_RANDOM_TOKEN"

# ── Headlamp OIDC ─────────────────────────────────────────────────
# Client secret for the Headlamp OAuth2 provider in Authentik.
# Generate: python3 -c "import secrets; print(secrets.token_urlsafe(32))"
# Must be set before running --tags dashboard when Authentik is deployed.
headlamp_oidc_client_secret: "REPLACE_WITH_LONG_RANDOM_SECRET"
