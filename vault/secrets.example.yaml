# vault/secrets.example.yaml
#
# !! ENCRYPT BEFORE COMMITTING !!
#
#   ansible-vault encrypt vault/secrets.yaml
#   ansible-vault edit   vault/secrets.yaml
#
# Run with:
#   ansible-playbook -i inventory/hosts.yaml site.yaml --ask-vault-pass

# ── Cloudflare ────────────────────────────────────────────────────
# Restricted API Token — create at https://dash.cloudflare.com/profile/api-tokens
# Required permissions:
#   Zone > DNS  > Edit  (for your zone)
#   Zone > Zone > Read  (for your zone)
cloudflare_api_token: "REPLACE_WITH_CLOUDFLARE_RESTRICTED_API_TOKEN"

# Cloudflare Account ID — found at https://dash.cloudflare.com (right sidebar)
# Required by os-acme-client when using a Restricted API Token (dns_cf_account_id)
cloudflare_account_id: "REPLACE_WITH_CLOUDFLARE_ACCOUNT_ID"

# Cloudflare Zone ID (hex) — found in the zone overview page right sidebar
# Used for direct CF REST API calls (ddclient record pre-creation, register-service)
cloudflare_zone_id: "REPLACE_WITH_CLOUDFLARE_ZONE_ID"

# ── OPNsense API ──────────────────────────────────────────────────
# Create at: OPNsense GUI -> System -> Access -> Users -> your user -> API keys
# Minimum privilege required: OPNsense -> HAProxy, ACME Client, Unbound DNS, Firewall
opnsense_api_key: "REPLACE_WITH_OPNSENSE_API_KEY"
opnsense_api_secret: "REPLACE_WITH_OPNSENSE_API_SECRET"
