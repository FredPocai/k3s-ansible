---
# site.yaml — k3s homelab cluster deployment
#
# Usage:
#   Full deploy:        ansible-playbook -i inventory/hosts.yaml site.yaml --ask-vault-pass
#   Single tag:         ansible-playbook -i inventory/hosts.yaml site.yaml --tags <tag> --ask-vault-pass
#
# Tags: prereqs, k3s, calico, cert-manager, longhorn, ingress, dashboard
#
# Vault: copy vault/secrets.example.yaml → vault/secrets.yaml, fill in values, then encrypt. cloudflare_api_token, opnsense_api_key,
#        opnsense_api_secret. Encrypt before committing:
#          ansible-vault encrypt vault/secrets.yaml

# Load vault secrets into all plays
- name: Load vault secrets
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Include vault secrets
      ansible.builtin.include_vars:
        file: vault/secrets.yaml
      tags: always

# ── Phase 1: System prerequisites (all nodes in parallel) ─────────
- name: Prepare all nodes
  hosts: k3s_cluster
  become: true
  gather_facts: true
  tags: [prereqs]
  roles:
    - prereqs

# ── Phase 2: Bootstrap init node ──────────────────────────────────
- name: Bootstrap k3s init node (k3s211)
  hosts: k3s_init
  become: true
  gather_facts: false
  tags: [k3s]
  roles:
    - k3s-server

# ── Phase 3: Join remaining nodes ─────────────────────────────────
- name: Join k3s nodes to cluster (k3s212, k3s213)
  hosts: k3s_join
  become: true
  gather_facts: false
  serial: 1
  tags: [k3s]
  roles:
    - k3s-server

# ── Phase 4: Calico CNI ───────────────────────────────────────────
- name: Install Calico
  hosts: k3s_init
  become: true
  gather_facts: false
  tags: [calico]
  roles:
    - calico

# ── Phase 5: cert-manager ─────────────────────────────────────────
- name: Install cert-manager with Cloudflare DNS-01
  hosts: k3s_init
  become: true
  gather_facts: false
  tags: [cert-manager]
  vars_files:
    - vault/secrets.yaml
  roles:
    - cert-manager

# ── Phase 6: Longhorn ─────────────────────────────────────────────
- name: Install Longhorn distributed storage
  hosts: k3s_init
  become: true
  gather_facts: false
  tags: [longhorn]
  roles:
    - longhorn

# ── Phase 7: ingress-nginx ────────────────────────────────────────
- name: Install ingress-nginx
  hosts: k3s_init
  become: true
  gather_facts: false
  tags: [ingress]
  roles:
    - ingress-nginx

# ── Phase 8: Headlamp dashboard ───────────────────────────────────
- name: Install Headlamp dashboard
  hosts: k3s_init
  become: true
  gather_facts: false
  tags: [dashboard]
  vars_files:
    - vault/secrets.yaml
  roles:
    - headlamp

# ── Phase 9: OPNsense — plugin install ───────────────────────────
# Installs os-haproxy and os-acme-client; removes stale plugin stubs.
# Safe to re-run.
- name: Install OPNsense plugins (os-haproxy, os-acme-client)
  hosts: k3s_init
  become: false
  gather_facts: false
  tags: [opnsense]
  tags: [opnsense, opnsense-plugins]
  vars_files:
    - vault/secrets.yaml
  roles:
    # - opnsense
    - opnsense-plugins

# ── Phase 10: OPNsense — ACME / Let's Encrypt ────────────────────
# Configures os-acme-client: account, Cloudflare DNS-01, fw cert.
# Safe to re-run (check-before-create throughout).
- name: Configure OPNsense ACME / Let's Encrypt
  hosts: k3s_init
  become: false
  gather_facts: false
  tags: [opnsense, opnsense-acme]
  vars_files:
    - vault/secrets.yaml
  roles:
    - opnsense-acme

# ── Phase 11: OPNsense — HAProxy ──────────────────────────────────
# Configures HAProxy: servers, backends, ACLs, actions, frontends.
# Depends on acme_cert_uuid set by opnsense-acme (or falls back to
# cert manager lookup when run standalone).
# Safe to re-run (check-before-create throughout).
- name: Configure OPNsense HAProxy
  hosts: k3s_init
  become: false
  gather_facts: false
  tags: [opnsense, opnsense-haproxy]
  vars_files:
    - vault/secrets.yaml
  roles:
    - opnsense-haproxy


# -- Phase 12: OPNsense -- ddclient (Dynamic DNS) ------------------
# Installs os-ddclient and configures Cloudflare DynDNS for WAN IP updates.
# Only runs when opnsense_ddns_hosts is non-empty.
# Skip entirely with: --skip-tags opnsense-ddclient
- name: Configure OPNsense ddclient (DynDNS)
  hosts: k3s_init
  become: false
  gather_facts: false
  tags: [opnsense, opnsense-ddclient]
  vars_files:
    - vault/secrets.yaml
  roles:
    - role: opnsense-ddclient
      when: opnsense_ddns_hosts | default([]) | length > 0
