---
# site.yaml — k3s homelab cluster deployment
#
# Usage:
#   Full deploy:        ansible-playbook -i inventory/hosts.yaml site.yaml --ask-vault-pass
#   Single tag:         ansible-playbook -i inventory/hosts.yaml site.yaml --tags <tag> --ask-vault-pass
#   Register service:   ansible-playbook -i inventory/hosts.yaml site.yaml --tags register-service \
#                         -e '{"service":{"name":"myapp","hostname":"myapp.example.com","public":false}}'
#
# Tags:
#   prereqs, k3s, calico, cert-manager, longhorn, ingress, dashboard
#   local-path, cnpg, authentik
#   opnsense, opnsense-plugins, opnsense-acme, opnsense-ddclient
#   haproxy-servers, haproxy-backends, haproxy-acls, haproxy-actions, haproxy-frontends
#   register-service
#
# Vault: copy vault/secrets.example.yaml -> vault/secrets.yaml, fill in values, then encrypt:
#   ansible-vault encrypt vault/secrets.yaml

# Load vault secrets into all plays
- name: Load vault secrets
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Include vault secrets
      ansible.builtin.include_vars:
        file: vault/secrets.yaml
      tags: always
  no_log: true

# ── Phase 1: System prerequisites (all nodes in parallel) ─────────
- name: Prepare all nodes
  hosts: k3s_cluster
  become: true
  gather_facts: true
  tags: [prereqs]
  roles:
    - prereqs

# ── Phase 2: Bootstrap init node ──────────────────────────────────
- name: Bootstrap k3s init node
  hosts: k3s_init
  become: true
  gather_facts: false
  tags: [k3s]
  roles:
    - k3s-server

# ── Phase 3: Join remaining nodes ─────────────────────────────────
- name: Join k3s nodes to cluster
  hosts: k3s_join
  become: true
  gather_facts: false
  serial: 1
  tags: [k3s]
  roles:
    - k3s-server

# ── Phase 4: Calico CNI ───────────────────────────────────────────
- name: Install Calico
  hosts: k3s_init
  become: true
  gather_facts: false
  tags: [calico]
  roles:
    - calico

# ── Phase 5: cert-manager ─────────────────────────────────────────
- name: Install cert-manager with Cloudflare DNS-01
  hosts: k3s_init
  become: true
  gather_facts: false
  tags: [cert-manager]
  vars_files:
    - vault/secrets.yaml
  roles:
    - cert-manager

# ── Phase 6: Longhorn ─────────────────────────────────────────────
- name: Install Longhorn distributed storage
  hosts: k3s_init
  become: true
  gather_facts: false
  tags: [longhorn]
  roles:
    - longhorn

# ── Phase 7: ingress-nginx ────────────────────────────────────────
- name: Install ingress-nginx
  hosts: k3s_init
  become: true
  gather_facts: false
  tags: [ingress]
  roles:
    - ingress-nginx

# ── Phase 8: Headlamp dashboard ───────────────────────────────────
- name: Install Headlamp dashboard
  hosts: k3s_init
  gather_facts: false
  tags: [dashboard]
  vars_files:
    - vault/secrets.yaml
  roles:
    - headlamp

# ── Phase 9: local-path-provisioner ──────────────────────────────
# Node-local StorageClass backed by /var/lib/longhorn/local-path (sdb).
# WaitForFirstConsumer binding — pod schedules first, volume follows.
# Used by CNPG for low-latency Postgres storage; Longhorn remains default SC.
- name: Install local-path-provisioner
  hosts: k3s_init
  become: true
  gather_facts: false
  tags: [local-path]
  roles:
    - local-path

# ── Phase 10: CloudNativePG operator ─────────────────────────────
# Installs the CNPG operator only — Cluster CRs are deployed by consuming
# roles (authentik, librenms, etc.) using roles/cnpg/templates/cluster.yaml.j2.
- name: Install CloudNativePG operator
  hosts: k3s_init
  gather_facts: false
  tags: [cnpg]
  roles:
    - cnpg

# ── Phase 11: Authentik IdP ───────────────────────────────────────
# Self-hosted OIDC/SAML identity provider.
# Deploys: CNPG PostgreSQL cluster, Redis, Authentik server+worker.
# Registers idp.{{ base_domain }} in OPNsense (Unbound + HAProxy + ACME).
# Vault requirements: authentik_secret_key, authentik_pg_password,
#                     authentik_bootstrap_email, authentik_bootstrap_password
- name: Install Authentik IdP
  hosts: k3s_init
  gather_facts: false
  tags: [authentik]
  vars_files:
    - vault/secrets.yaml
  roles:
    - authentik

# ── Phase 12: OPNsense — plugin install ──────────────────────────
- name: Install OPNsense plugins (os-haproxy, os-acme-client)
  hosts: k3s_init
  become: false
  gather_facts: false
  tags: [opnsense, opnsense-plugins]
  vars_files:
    - vault/secrets.yaml
  roles:
    - opnsense-plugins

# ── Phase 13: OPNsense — ACME / Let's Encrypt ────────────────────
- name: Configure OPNsense ACME / Let's Encrypt
  hosts: k3s_init
  become: false
  gather_facts: false
  tags: [opnsense, opnsense-acme]
  vars_files:
    - vault/secrets.yaml
  roles:
    - opnsense-acme

# ── Phase 14: OPNsense — HAProxy servers ─────────────────────────
# Creates k3s node server entries, fw-ssl-loopback, opnsense-gui.
# Safe to re-run — only creates missing objects.
- name: Configure OPNsense HAProxy servers
  hosts: k3s_init
  become: false
  gather_facts: false
  tags: [opnsense, haproxy-servers]
  vars_files:
    - vault/secrets.yaml
  roles:
    - opnsense-haproxy-servers

# ── Phase 15: OPNsense — HAProxy backends ────────────────────────
# Creates k3s-ingress (TCP), fw-ssl-loopback (TCP), opnsense-gui (HTTP).
# Deletes and recreates any backend that exists in the wrong mode.
- name: Configure OPNsense HAProxy backends
  hosts: k3s_init
  become: false
  gather_facts: false
  tags: [opnsense, haproxy-backends]
  vars_files:
    - vault/secrets.yaml
  roles:
    - opnsense-haproxy-backends

# ── Phase 16: OPNsense — HAProxy ACLs ────────────────────────────
# Creates sni_<name> ACLs for each entry in k3s_services.
- name: Configure OPNsense HAProxy ACLs
  hosts: k3s_init
  become: false
  gather_facts: false
  tags: [opnsense, haproxy-acls]
  vars_files:
    - vault/secrets.yaml
  roles:
    - opnsense-haproxy-acls

# ── Phase 17: OPNsense — HAProxy actions ─────────────────────────
# Creates route_<name> use-backend actions for each k3s_service.
# Removes any route_ action pointing at the wrong backend.
- name: Configure OPNsense HAProxy actions
  hosts: k3s_init
  become: false
  gather_facts: false
  tags: [opnsense, haproxy-actions]
  vars_files:
    - vault/secrets.yaml
  roles:
    - opnsense-haproxy-actions

# ── Phase 18: OPNsense — HAProxy frontends ───────────────────────
# Creates/repairs k3s-https (:443 TCP), http-redirect (:80), fw-https (:8444).
# Deletes and recreates k3s-https if it exists in the wrong mode.
# Always updates linkedActions so new services are wired in.
- name: Configure OPNsense HAProxy frontends
  hosts: k3s_init
  become: false
  gather_facts: false
  tags: [opnsense, haproxy-frontends]
  vars_files:
    - vault/secrets.yaml
  roles:
    - opnsense-haproxy-frontends

# ── Phase 19: OPNsense — ddclient (Dynamic DNS) ──────────────────
- name: Configure OPNsense ddclient (DynDNS)
  hosts: k3s_init
  become: false
  gather_facts: false
  tags: [opnsense, opnsense-ddclient]
  vars_files:
    - vault/secrets.yaml
  roles:
    - role: opnsense-ddclient
      when: opnsense_ddns_hosts | default([]) | length > 0

# ── Phase 20: OPNsense — register-service ────────────────────────
# Not run during full deploy — invoke explicitly with --tags register-service.
#
# Examples:
#   # Internal-only:
#   ansible-playbook -i inventory/hosts.yaml site.yaml \
#     --tags register-service --ask-vault-pass \
#     -e '{"service":{"name":"myapp","hostname":"myapp.example.com"}}'
#
#   # Public (CF A record + NAT):
#   ansible-playbook -i inventory/hosts.yaml site.yaml \
#     --tags register-service --ask-vault-pass \
#     -e '{"service":{"name":"myapp","hostname":"myapp.example.com","public":true}}'
- name: Register a service in OPNsense (on-demand)
  hosts: k3s_init
  become: false
  gather_facts: false
  tags: [register-service]
  vars_files:
    - vault/secrets.yaml
  roles:
    - role: opnsense-register-service
      when: service is defined
