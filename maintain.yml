---
# maintain.yml — Rolling maintenance playbook
#
# Safely updates all k3s nodes one at a time.
# Handles both in-cluster nodes (cordon/drain/uncordon) and
# nodes with a broken/partial install (k3s-uninstall.sh + reboot).
#
# Usage:
#   ansible-playbook -i inventory/hosts.yml maintain.yml
#
# To only run on a specific node:
#   ansible-playbook -i inventory/hosts.yml maintain.yml --limit k3s211
#
# To do a dry-run (check what would be upgraded without applying):
#   ansible-playbook -i inventory/hosts.yml maintain.yml --check

- name: Rolling node maintenance
  hosts: k3s_cluster
  become: true
  gather_facts: true
  serial: 1          # one node at a time — keeps cluster quorum intact
  max_fail_percentage: 0   # abort entire play if any node fails
  roles:
    - maintain
